# OllamaChatModel - connects to Ollama server
dev.langchain4j.cdi.plugin.chat-model.class=dev.langchain4j.model.ollama.OllamaChatModel
dev.langchain4j.cdi.plugin.chat-model.config.base-url=http://localhost:11434
dev.langchain4j.cdi.plugin.chat-model.config.temperature=0.1
dev.langchain4j.cdi.plugin.chat-model.config.model-name=qwen3.5:4b
dev.langchain4j.cdi.plugin.chat-model.config.log-requests=false
dev.langchain4j.cdi.plugin.chat-model.config.log-responses=true
dev.langchain4j.cdi.plugin.chat-model.config.supportedCapabilities=dev.langchain4j.model.chat.Capability.RESPONSE_FORMAT_JSON_SCHEMA

# MessageWindowChatMemory - keeps last N messages
dev.langchain4j.cdi.plugin.chat-ai-service-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.chat-ai-service-memory.scope=jakarta.enterprise.context.ApplicationScoped
dev.langchain4j.cdi.plugin.chat-ai-service-memory.config.maxMessages=10

# EmbeddingStoreContentRetriever - retrieves relevant documents from an embedding store
dev.langchain4j.cdi.plugin.doc-retriever.class=dev.langchain4j.rag.content.retriever.EmbeddingStoreContentRetriever
dev.langchain4j.cdi.plugin.doc-retriever.config.embeddingStore=lookup:@default
dev.langchain4j.cdi.plugin.doc-retriever.config.embeddingModel=lookup:@default
dev.langchain4j.cdi.plugin.doc-retriever.config.maxResults=5
dev.langchain4j.cdi.plugin.doc-retriever.config.minScore=0.6

# Chat Memory used by FraudAiService class
dev.langchain4j.cdi.plugin.fraud-ai-service-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.fraud-ai-service-memory.scope=jakarta.enterprise.context.ApplicationScoped
dev.langchain4j.cdi.plugin.fraud-ai-service-memory.config.maxMessages=20

# Location of documents to RAG
app.docs-for-rag.dir=docs-for-rag